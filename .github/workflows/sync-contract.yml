name: Sync TokenLab OpenAPI contract

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  actions: write
  contents: write

concurrency:
  group: sync-tokenlab-openapi-main
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Synchronize generated contract
        run: |
          npm run contract:sync

      - name: Prepare a recoverable contract release
        id: release
        run: node scripts/prepare-contract-release.mjs --prepare

      - name: Verify synchronized package
        run: |
          npm test

      - name: Commit and tag verified contract drift
        run: |
          if [[ "${{ steps.release.outputs.needs_commit }}" != "true" && "${{ steps.release.outputs.needs_release }}" != "true" ]]; then
            echo "TokenLab OpenAPI contract is already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ "${{ steps.release.outputs.needs_commit }}" == "true" ]]; then
            git add -- \
              README.md \
              contract/openapi.json \
              generated/public-contract.json \
              generated/tools.json \
              llms-install.md \
              package-lock.json \
              package.json \
              server.json
            git diff --cached --check
            if [[ "${{ steps.release.outputs.needs_release }}" == "true" ]]; then
              git commit -m "chore(contract): sync TokenLab OpenAPI for ${{ steps.release.outputs.tag }}"
            else
              git commit -m "chore(contract): sync TokenLab OpenAPI"
            fi
            git push origin HEAD:main
          fi
          if [[ "${{ steps.release.outputs.needs_release }}" == "true" ]]; then
            if git rev-parse "${{ steps.release.outputs.tag }}" >/dev/null 2>&1; then
              tagged_version="$(git show "${{ steps.release.outputs.tag }}:package.json" | node -e 'let data=""; process.stdin.on("data", chunk => data += chunk); process.stdin.on("end", () => process.stdout.write(JSON.parse(data).version))')"
              test "v${tagged_version}" = "${{ steps.release.outputs.tag }}"
            else
              git tag "${{ steps.release.outputs.tag }}"
              git push origin "${{ steps.release.outputs.tag }}"
            fi
          fi

      - name: Dispatch trusted release workflow
        if: steps.release.outputs.needs_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run publish-npm.yml \
            --ref main \
            -f version_ref="${{ steps.release.outputs.tag }}"
