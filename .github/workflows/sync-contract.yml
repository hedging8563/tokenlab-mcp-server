name: Sync TokenLab OpenAPI contract

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-tokenlab-openapi-main
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Synchronize and verify generated contract
        run: |
          npm run contract:sync
          npm test

      - name: Commit verified contract drift
        run: |
          if git diff --quiet -- contract/openapi.json generated/tools.json; then
            echo "TokenLab OpenAPI contract is already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- contract/openapi.json generated/tools.json
          git diff --cached --check
          git commit -m "chore(contract): sync TokenLab OpenAPI"
          git push origin HEAD:main
